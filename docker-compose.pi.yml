version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        BLUEFOLDER_API_REF: main
        OPT_ROUTING_REF: main
    env_file:
      - backend/.env
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE: /api/
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

# On a Pi, remember to enable cgroup memory/cpu support if using resource limits.
